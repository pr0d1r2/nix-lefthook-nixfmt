pre-commit:
  parallel: true
  commands:
    nixfmt:
      glob: "*.nix"
      run: bash scripts/lefthook/nixfmt-check.sh {staged_files}
    markdownlint:
      glob: "*.md"
      run: bash scripts/lefthook/markdownlint-check.sh {staged_files}
    taplo:
      glob: "*.toml"
      run: bash scripts/lefthook/taplo-check.sh {staged_files}

pre-push:
  parallel: true
  commands:
    nixfmt:
      glob: "*.nix"
      run: bash scripts/lefthook/nixfmt-check.sh {push_files}
    markdownlint:
      glob: "*.md"
      run: bash scripts/lefthook/markdownlint-check.sh {push_files}
    taplo:
      glob: "*.toml"
      run: bash scripts/lefthook/taplo-check.sh {push_files}
